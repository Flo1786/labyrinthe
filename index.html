function dTree(ctx,tx,ty,sc,v){var h=H*.38*sc,tw=h*.55,base=ty+h*.05;ctx.fillStyle="#1a1008";ctx.fillRect(tx-tw*.08,base-h*.3,tw*.16,h*.35);var gs=[["#162a10","#1e3a18","#254820"],["#122010","#1a3018","#223818"],["#0e1c0a","#162614","#1e3018"]];for(var l=0;l<3;l++){ctx.beginPath();ctx.arc(tx,base-h*(.45+l*.22),tw*(.48-l*.08),0,Math.PI*2);ctx.fillStyle=gs[v][l];ctx.fill();}}
function dFBG(ctx){dBG(ctx);TREES.forEach(function(t){dTree(ctx,t.x*W,H*.22+t.y*(H*.52),t.s,t.v);});}
function dEl(ctx,el,h2){var x=el.x*W,y=el.y*H,w=el.w*W,h=el.h*H;ctx.globalAlpha=h2?1:0.75;if(el.type==="door"){ctx.fillStyle=el.color;rR(ctx,x,y,w,h,6);ctx.fill();ctx.fillStyle="rgba(0,0,0,0.3)";for(var i=1;i<4;i++)ctx.fillRect(x+2,y+h*(i/4),w-4,1.5);ctx.fillStyle="#e8c060";ctx.beginPath();ctx.arc(x+w*.75,y+h*.55,4,0,Math.PI*2);ctx.fill();if(h2){ctx.strokeStyle="#f0d060";ctx.lineWidth=2.5;rR(ctx,x-2,y-2,w+4,h+4,7);ctx.stroke();}}if(el.type==="vine"){ctx.strokeStyle=h2?"#8ade50":"#4a8a2a";ctx.lineWidth=h2?8:6;ctx.lineCap="round";ctx.beginPath();for(var j=0;j<=20;j++){var t2=j/20;ctx.lineTo(x+w/2+Math.sin(t2*Math.PI*2.5)*w*.4,y+h*t2);}ctx.stroke();for(var k=0;k<6;k++){var tk=k/6;ctx.fillStyle=h2?"#6aee30":"#3a8a1a";ctx.beginPath();ctx.ellipse(x+w/2+Math.sin(tk*Math.PI*2.5)*w*.4+(-1+k%2*2)*11,y+h*(tk+.05),9,5,Math.PI*.3*k,0,Math.PI*2);ctx.fill();}if(h2){ctx.fillStyle="rgba(140,220,80,0.12)";ctx.beginPath();ctx.ellipse(x+w/2,y+h/2,w*.8,h*.55,0,0,Math.PI*2);ctx.fill();}}if(el.type==="river"){ctx.fillStyle=h2?"#3a8acc":"#1a5a9a";rR(ctx,x,y,w,h,h/2);ctx.fill();ctx.strokeStyle="rgba(150,200,255,0.35)";ctx.lineWidth=1.5;for(var r2=0;r2<3;r2++){ctx.beginPath();ctx.moveTo(x+w*.1+r2*w*.06,y+h*.4);ctx.quadraticCurveTo(x+w*.35+r2*w*.05,y+h*.2,x+w*.6+r2*w*.04,y+h*.4);ctx.stroke();}if(h2){ctx.strokeStyle="#70c0ff";ctx.lineWidth=2;rR(ctx,x-2,y-2,w+4,h+4,h/2+2);ctx.stroke();}}if(el.type==="tree"){var tx2=x+w/2,ty2=y+h,th=h*.85,tw2=w*.9;ctx.fillStyle="#1a1008";ctx.fillRect(tx2-tw2*.12,ty2-th*.38,tw2*.24,th*.4);var tg=h2?["#2a5a18","#3a7a28","#4a9a38"]:["#1a3a10","#254a18","#305820"];for(var ll=0;ll<3;ll++){ctx.beginPath();ctx.arc(tx2,ty2-th*(.45+ll*.22),tw2*(.5-ll*.1),0,Math.PI*2);ctx.fillStyle=tg[ll];ctx.fill();}if(h2){ctx.strokeStyle="#a0e060";ctx.lineWidth=2;ctx.beginPath();ctx.arc(tx2,ty2-th*.6,tw2*.62,0,Math.PI*2);ctx.stroke();}}ctx.globalAlpha=1;if(h2){var lx=x+w/2,ly=y-14,lbl=el.label;ctx.font="bold 12px system-ui";var tw3=ctx.measureText(lbl).width;ctx.fillStyle="rgba(5,20,5,0.9)";rR(ctx,lx-tw3/2-8,ly-17,tw3+16,22,6);ctx.fill();ctx.strokeStyle="#5aaa2a";ctx.lineWidth=1;ctx.stroke();ctx.fillStyle="#b0e880";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(lbl,lx,ly-6);ctx.textAlign="left";ctx.textBaseline="alphabetic";}}
function dMM(){var mc=document.getElementById("minimap");if(!mc)return;var mx=mc.getContext("2d");mx.fillStyle="#0a180a";mx.fillRect(0,0,100,100);mx.strokeStyle="rgba(80,140,50,0.35)";mx.lineWidth=1.5;mx.setLineDash([3,3]);mx.beginPath();MN.forEach(function(n,i){if(i===0)mx.moveTo(n.x*100,n.y*100);else mx.lineTo(n.x*100,n.y*100);});mx.stroke();mx.setLineDash([]);MN.forEach(function(n,i){if(i>STEPS.length)return;var done=i<step,cur=i===step;mx.beginPath();mx.arc(n.x*100,n.y*100,done?3:cur?5:2,0,Math.PI*2);mx.fillStyle=done?"#4a8a3a":cur?"#f0d060":"#2a4a2a";mx.fill();});mx.fillStyle="#5a8a5a";mx.font="8px system-ui";mx.textAlign="center";mx.fillText("Carte",50,95);}
function dScene(){var cv=document.getElementById("view");if(!cv)return;cv.width=W;cv.height=H;var ctx=cv.getContext("2d");dFBG(ctx);if(step>=STEPS.length){ctx.fillStyle="rgba(10,30,10,0.75)";ctx.fillRect(0,0,W,H);ctx.fillStyle="#a0e080";ctx.font="bold 26px system-ui";ctx.textAlign="center";ctx.fillText("Tu as traversé la forêt.",W/2,H/2-18);ctx.fillStyle="#6ade60";ctx.font="15px system-ui";ctx.fillText("Découvre ton archétype ci-dessous.",W/2,H/2+18);ctx.textAlign="left";}else{STEPS[step].elements.forEach(function(el,i){dEl(ctx,el,hov===i);});ctx.fillStyle="rgba(0,0,0,0.55)";rR(ctx,10,10,175,26,6);ctx.fill();ctx.fillStyle="#7aca6a";ctx.font="11px system-ui";ctx.fillText("Clairière "+(step+1)+" / "+STEPS.length,18,27);}if(trans){ctx.fillStyle="rgba(0,0,0,"+tA+")";ctx.fillRect(0,0,W,H);}dMM();}
function gHit(mx,my){if(step>=STEPS.length)return -1;var els=STEPS[step].elements;for(var i=els.length-1;i>=0;i--){var el=els[i];if(mx>=el.x*W&&mx<=(el.x+el.w)*W&&my>=el.y*H&&my<=(el.y+el.h)*H)return i;}return -1;}
function doTrans(cb){trans=true;tA=0;var up=true,fr=0;var a=setInterval(function(){fr++;if(up){tA=Math.min(1,tA+0.15);if(tA>=1){up=false;cb();}}else{tA=Math.max(0,tA-0.12);if(tA<=0){clearInterval(a);trans=false;}}dScene();},30);}
var cv=document.getElementById("view"),tt=document.getElementById("tooltip");
cv.addEventListener("mousemove",function(e){var r=cv.getBoundingClientRect(),sc=W/r.width;var mx=(e.clientX-r.left)*sc,my=(e.clientY-r.top)*sc;var hit=gHit(mx,my);if(hit!==hov){hov=hit;dScene();}if(hit>=0){var el=STEPS[step].elements[hit];tt.style.display="block";tt.style.left=Math.min(e.clientX-r.left+14,r.width-250)+"px";tt.style.top=Math.max(e.clientY-r.top-55,8)+"px";tt.innerHTML="<span style='color:#8ade50;font-size:11px;text-transform:uppercase'>"+(el.type==="door"?"Porte":el.type==="vine"?"Liane":el.type==="river"?"Rivière":"Arbre")+"</span><br>"+el.text;cv.style.cursor="pointer";}else{tt.style.display="none";cv.style.cursor="default";}});
cv.addEventListener("mouseleave",function(){hov=null;tt.style.display="none";dScene();});
function hClick(mx,my){if(trans)return;var hit=gHit(mx,my);if(hit<0)return;var el=STEPS[step].elements[hit];playClick(el.type);tt.style.display="none";doTrans(function(){Object.entries(el.scores).forEach(function(e){scores[e[0]]=(scores[e[0]]||0)+e[1];});step++;hov=null;if(step>=STEPS.length)playReveal();dScene();rPanel();});}
cv.addEventListener("click",function(e){var r=cv.getBoundingClientRect(),sc=W/r.width;hClick((e.clientX-r.left)*sc,(e.clientY-r.top)*sc);});
cv.addEventListener("touchend",function(e){e.preventDefault();var r=cv.getBoundingClientRect(),sc=W/r.width,t=e.changedTouches[0];hClick((t.clientX-r.left)*sc,(t.clientY-r.top)*sc);},{passive:false});
function topK(){return Object.entries(scores).sort(function(a,b){return b[1]-a[1];})[0][0];}
function setTab(t){tab=t;sResult(document.getElementById("scene-panel"));}
function rPanel(){var p=document.getElementById("scene-panel");if(step>=STEPS.length){sResult(p);return;}var s=STEPS[step];p.innerHTML="<div class='sinfo'>Clairière "+(step+1)+" sur "+STEPS.length+"</div><div class='slabel'>Ce que tu vis</div><div class='stext'>"+s.scene+"</div><div class='shint'>Clique sur une porte, une liane, une rivière ou un arbre.</div>";}
function sResult(p){var key=topK(),a=ARCHETYPES[key];var mx=Math.max.apply(null,Object.values(scores));var sc2=Math.min(100,Math.round((mx/30)*100));finishSCORM(a.label,sc2);var tabs=["profil","détail","réflexion"];var tb="<div class='tab-bar'>"+tabs.map(function(t){return"<button class='tab"+(tab===t?" active":"")+"' onclick='setTab(\""+t+"\")'>"+t.charAt(0).toUpperCase()+t.slice(1)+"</button>";}).join("")+"</div>";var content="";if(tab==="profil")content="<div class='badge'>"+a.badge+"</div><div class='arch-name'>"+a.label+"</div><div class='arch-desc'>"+a.desc+"</div><div class='sec'>Tes traits</div><div class='traits'>"+a.traits.map(function(t){return"<span class='trait'>"+t+"</span>";}).join("")+"</div>";else if(tab==="détail")content="<div class='arch-name' style='font-size:18px;margin-bottom:1rem'>"+a.label+"</div><div class='sec'>Tes forces</div><div class='info-block'><p>"+a.forces+"</p></div><div class='sec'>Ton ombre</div><div class='info-block'><p>"+a.ombre+"</p></div><div class='sec'>En coaching</div><div class='info-block'><p>"+a.coaching+"</p></div>";else content="<div class='arch-name' style='font-size:18px;margin-bottom:.25rem'>"+a.label+"</div><p style='font-size:13px;color:#4a8a4a;margin-bottom:1.25rem'>Prends le temps de répondre à ces questions.</p>"+a.questions.map(function(q,i){return"<div class='q-card'><div class='q-num'>Question "+(i+1)+"</div><p>"+q+"</p></div>";}).join("");p.innerHTML="<div class='scorm-ok'>Résultat enregistré : <strong>"+a.label+"</strong></div>"+tb+"<div class='result-card'>"+content+"</div><button class='restart-btn' onclick='restart()'>Recommencer</button>";}
function restart(){scores={Flamme:0,Tisserand:0,Oracle:0,Racine:0,Reflet:0,Passeur:0};step=0;tab="profil";hov=null;initSCORM();dScene();rPanel();}
document.getElementById("overlay").addEventListener("click",function(){this.classList.add("fade");setTimeout(function(){document.getElementById("overlay").style.display="none";},700);playWind();initSCORM();});
dScene();rPanel();
</script>
