<script>
var W=720,H=380,actx=null,masterGain,started=false;

function initAmbience(){
  if(started)return;started=true;
  actx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=actx.createGain();masterGain.gain.value=0.45;masterGain.connect(actx.destination);

  // Nappes mystérieuses — durée infinie
  var notes=[55,82,110,73];
  notes.forEach(function(freq){
    var o=actx.createOscillator(),g=actx.createGain(),f=actx.createBiquadFilter();
    f.type='lowpass';f.frequency.value=400;o.type='sine';o.frequency.value=freq;
    g.gain.setValueAtTime(0,actx.currentTime);
    g.gain.linearRampToValueAtTime(0.04,actx.currentTime+0.3);
    var lfo=actx.createOscillator(),lg=actx.createGain();
    lfo.frequency.value=0.05+Math.random()*0.05;lg.gain.value=0.015;
    lfo.connect(lg);lg.connect(g.gain);lfo.start();
    o.connect(f);f.connect(g);g.connect(masterGain);o.start();
  });

  // Mélodie mystérieuse
  function mysteryNote(delay){
    if(!started)return;
    setTimeout(function(){
      var scale=[196,220,246,261,293,329,349];
      var freq=scale[Math.floor(Math.random()*scale.length)];
      var o=actx.createOscillator(),g=actx.createGain();
      o.type='sine';o.frequency.value=freq;
      g.gain.setValueAtTime(0,actx.currentTime);
      g.gain.linearRampToValueAtTime(0.07,actx.currentTime+0.2);
      g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+2.5);
      o.connect(g);g.connect(masterGain);o.start();o.stop(actx.currentTime+3);
      mysteryNote(2500+Math.random()*4000);
    },delay);
  }
  mysteryNote(0);

  // Oiseaux tropicaux
  function bird(delay){
    if(!started)return;
    setTimeout(function(){
      var patterns=[[523,659,587,784],[880,784,659,523,587],[392,523,440,587]];
      var pat=patterns[Math.floor(Math.random()*patterns.length)];
      pat.forEach(function(f,i){setTimeout(function(){
        var o=actx.createOscillator(),g=actx.createGain();
        o.frequency.value=f*(0.95+Math.random()*0.1);o.type='sine';
        g.gain.setValueAtTime(0,actx.currentTime);
        g.gain.linearRampToValueAtTime(0.06,actx.currentTime+0.03);
        g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.35);
        o.connect(g);g.connect(masterGain);o.start();o.stop(actx.currentTime+0.4);
      },i*130);});
      bird(4000+Math.random()*7000);
    },delay);
  }
  bird(300);

  // Singes
  function monkey(delay){
    if(!started)return;
    setTimeout(function(){
      var n=2+Math.floor(Math.random()*3);
      for(var i=0;i<n;i++){(function(i){setTimeout(function(){
        var o=actx.createOscillator(),g=actx.createGain();
        var bf=160+Math.random()*60;
        o.frequency.setValueAtTime(bf,actx.currentTime);
        o.frequency.linearRampToValueAtTime(bf*1.5,actx.currentTime+0.1);
        o.frequency.linearRampToValueAtTime(bf*0.8,actx.currentTime+0.22);
        o.type='sawtooth';
        g.gain.setValueAtTime(0,actx.currentTime);
        g.gain.linearRampToValueAtTime(0.09,actx.currentTime+0.05);
        g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.28);
        o.connect(g);g.connect(masterGain);o.start();o.stop(actx.currentTime+0.3);
      },i*350);})(i);}
      monkey(10000+Math.random()*15000);
    },delay);
  }
  monkey(3000);

  // Grenouilles tropicales
  function frog(delay){
    if(!started)return;
    setTimeout(function(){
      var o=actx.createOscillator(),g=actx.createGain();
      o.frequency.value=180+Math.random()*40;o.type='square';
      g.gain.setValueAtTime(0,actx.currentTime);
      g.gain.linearRampToValueAtTime(0.04,actx.currentTime+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.15);
      o.connect(g);g.connect(masterGain);o.start();o.stop(actx.currentTime+0.18);
      frog(1500+Math.random()*4000);
    },delay);
  }
  frog(1000);

  // Insectes tropicaux — stridulation douce
  function insect(delay){
    if(!started)return;
    setTimeout(function(){
      var o=actx.createOscillator(),g=actx.createGain();
      o.frequency.value=2800+Math.random()*400;o.type='sine';
      g.gain.setValueAtTime(0,actx.currentTime);
      g.gain.linearRampToValueAtTime(0.025,actx.currentTime+0.05);
      g.gain.linearRampToValueAtTime(0.025,actx.currentTime+0.3);
      g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.5);
      o.connect(g);g.connect(masterGain);o.start();o.stop(actx.currentTime+0.55);
      insect(600+Math.random()*1200);
    },delay);
  }
  insect(500);
}

function playClick(type){
  if(!actx)return;
  try{
    var o=actx.createOscillator(),g=actx.createGain();
    var f={door:220,vine:440,river:330,tree:180};
    o.frequency.value=f[type]||300;o.type='sine';
    g.gain.setValueAtTime(0.15,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.4);
    o.connect(g);g.connect(masterGain);o.start();o.stop(actx.currentTime+0.4);
  }catch(e){}
}

function playReveal(){
  if(!actx)return;
  [261,329,392,523].forEach(function(f,i){setTimeout(function(){
    var o=actx.createOscillator(),g=actx.createGain();
    o.frequency.value=f;o.type='triangle';
    g.gain.setValueAtTime(0.1,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.8);
    o.connect(g);g.connect(masterGain);o.start();o.stop(actx.currentTime+0.8);
  },i*150);});
}

Passeur:{label:"Le Passeur",badge:"Soin & Transmission",desc:"Tu existes dans la relation à l'autre. Accompagner, soutenir, transmettre.",traits:["Empathique","Généreux·se","À l'écoute","Transmetteur·trice","Dévoué·e"],forces:"Tu sais tenir l'espace pour les autres d'une façon que peu savent faire.",ombre:"À force de donner, tu peux t'oublier.",coaching:"Apprends à recevoir autant que tu donnes.",questions:["Qui t'a accompagné·e de façon marquante ?","Prends-tu soin de toi avec la même générosité ?","Qu'est-ce que tu aimerais que quelqu'un fasse pour toi ?"]}
};

function sr(s){return function(){s=(s*16807)%2147483647;return(s-1)/2147483646;}}
var rng=sr(77),TREES=[];for(var i=0;i<70;i++)TREES.push({x:rng(),y:rng(),s:rng()*0.7+0.5,v:Math.floor(rng()*3)});
var MN=[{x:.1,y:.9},{x:.2,y:.75},{x:.15,y:.58},{x:.28,y:.44},{x:.42,y:.35},{x:.55,y:.42},{x:.68,y:.32},{x:.78,y:.48},{x:.72,y:.62},{x:.6,y:.74},{x:.48,y:.65}];
var scores={Flamme:0,Tisserand:0,Oracle:0,Racine:0,Reflet:0,Passeur:0},step=0,tab='profil',hov=null,trans=false,tA=0;
function rR(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}
function dBG(c){c.fillStyle='#0a180a';c.fillRect(0,0,W,H);c.fillStyle='#0d1e0d';c.fillRect(0,H*.2,W,H*.8);c.fillStyle='#162810';c.fillRect(0,H*.7,W,H*.3);}
function dT(c,tx,ty,sc,v){var h=H*.38*sc,tw=h*.55,b=ty+h*.05;c.fillStyle='#1a1008';c.fillRect(tx-tw*.08,b-h*.3,tw*.16,h*.35);var g=[['#162a10','#1e3a18','#254820'],['#122010','#1a3018','#223818'],['#0e1c0a','#162614','#1e3018']];for(var l=0;l<3;l++){c.beginPath();c.arc(tx,b-h*(.45+l*.22),tw*(.48-l*.08),0,Math.PI*2);c.fillStyle=g[v][l];c.fill();}}
function dFBG(c){dBG(c);TREES.forEach(function(t){dT(c,t.x*W,H*.22+t.y*(H*.52),t.s,t.v);});}
function dEl(c,el,h2){var x=el.x*W,y=el.y*H,w=el.w*W,h=el.h*H;c.globalAlpha=h2?1:.75;
if(el.type==='door'){c.fillStyle=el.color;rR(c,x,y,w,h,6);c.fill();c.fillStyle='rgba(0,0,0,0.3)';for(var i=1;i<4;i++)c.fillRect(x+2,y+h*(i/4),w-4,1.5);c.fillStyle='#e8c060';c.beginPath();c.arc(x+w*.75,y+h*.55,4,0,Math.PI*2);c.fill();if(h2){c.strokeStyle='#f0d060';c.lineWidth=2.5;rR(c,x-2,y-2,w+4,h+4,7);c.stroke();}}
if(el.type==='vine'){c.strokeStyle=h2?'#8ade50':'#4a8a2a';c.lineWidth=h2?8:6;c.lineCap='round';c.beginPath();for(var j=0;j<=20;j++){var t2=j/20;c.lineTo(x+w/2+Math.sin(t2*Math.PI*2.5)*w*.4,y+h*t2);}c.stroke();for(var k=0;k<6;k++){var tk=k/6;c.fillStyle=h2?'#6aee30':'#3a8a1a';c.beginPath();c.ellipse(x+w/2+Math.sin(tk*Math.PI*2.5)*w*.4+(-1+k%2*2)*11,y+h*(tk+.05),9,5,Math.PI*.3*k,0,Math.PI*2);c.fill();}if(h2){c.fillStyle='rgba(140,220,80,0.12)';c.beginPath();c.ellipse(x+w/2,y+h/2,w*.8,h*.55,0,0,Math.PI*2);c.fill();}}
if(el.type==='river'){c.fillStyle=h2?'#3a8acc':'#1a5a9a';rR(c,x,y,w,h,h/2);c.fill();c.strokeStyle='rgba(150,200,255,0.35)';c.lineWidth=1.5;for(var r2=0;r2<3;r2++){c.beginPath();c.moveTo(x+w*.1+r2*w*.06,y+h*.4);c.quadraticCurveTo(x+w*.35+r2*w*.05,y+h*.2,x+w*.6+r2*w*.04,y+h*.4);c.stroke();}if(h2){c.strokeStyle='#70c0ff';c.lineWidth=2;rR(c,x-2,y-2,w+4,h+4,h/2+2);c.stroke();}}
if(el.type==='tree'){var tx2=x+w/2,ty2=y+h,th=h*.85,tw2=w*.9;c.fillStyle='#1a1008';c.fillRect(tx2-tw2*.12,ty2-th*.38,tw2*.24,th*.4);var tg=h2?['#2a5a18','#3a7a28','#4a9a38']:['#1a3a10','#254a18','#305820'];for(var ll=0;ll<3;ll++){c.beginPath();c.arc(tx2,ty2-th*(.45+ll*.22),tw2*(.5-ll*.1),0,Math.PI*2);c.fillStyle=tg[ll];c.fill();}if(h2){c.strokeStyle='#a0e060';c.lineWidth=2;c.beginPath();c.arc(tx2,ty2-th*.6,tw2*.62,0,Math.PI*2);c.stroke();}}
c.globalAlpha=1;
if(h2){var lx=x+w/2,ly=y-14;c.font='bold 12px system-ui';var tw3=c.measureText(el.label).width;c.fillStyle='rgba(5,20,5,0.9)';rR(c,lx-tw3/2-8,ly-17,tw3+16,22,6);c.fill();c.strokeStyle='#5aaa2a';c.lineWidth=1;c.stroke();c.fillStyle='#b0e880';c.textAlign='center';c.textBaseline='middle';c.fillText(el.label,lx,ly-6);c.textAlign='left';c.textBaseline='alphabetic';}}
function dMM(){var mc=document.getElementById('minimap');if(!mc)return;var mx=mc.getContext('2d');mx.fillStyle='#0a180a';mx.fillRect(0,0,100,100);mx.strokeStyle='rgba(80,140,50,0.35)';mx.lineWidth=1.5;mx.setLineDash([3,3]);mx.beginPath();MN.forEach(function(n,i){if(i===0)mx.moveTo(n.x*100,n.y*100);else mx.lineTo(n.x*100,n.y*100);});mx.stroke();mx.setLineDash([]);MN.forEach(function(n,i){if(i>STEPS.length)return;mx.beginPath();mx.arc(n.x*100,n.y*100,i<step?3:i===step?5:2,0,Math.PI*2);mx.fillStyle=i<step?'#4a8a3a':i===step?'#f0d060':'#2a4a2a';mx.fill();});mx.fillStyle='#5a8a5a';mx.font='8px system-ui';mx.textAlign='center';mx.fillText('Carte',50,95);}
function dScene(){var cv=document.getElementById('view');if(!cv)return;cv.width=W;cv.height=H;var c=cv.getContext('2d');dFBG(c);if(step>=STEPS.length){c.fillStyle='rgba(10,30,10,0.75)';c.fillRect(0,0,W,H);c.fillStyle='#a0e080';c.font='bold 26px system-ui';c.textAlign='center';c.fillText('Tu as traversé la forêt.',W/2,H/2-18);c.fillStyle='#6ade60';c.font='15px system-ui';c.fillText('Découvre ton archétype ci-dessous.',W/2,H/2+18);c.textAlign='left';}else{STEPS[step].elements.forEach(function(el,i){dEl(c,el,hov===i);});c.fillStyle='rgba(0,0,0,0.55)';rR(c,10,10,175,26,6);c.fill();c.fillStyle='#7aca6a';c.font='11px system-ui';c.fillText('Clairière '+(step+1)+' / '+STEPS.length,18,27);}if(trans){c.fillStyle='rgba(0,0,0,'+tA+')';c.fillRect(0,0,W,H);}dMM();}
function gH(mx,my){if(step>=STEPS.length)return -1;var els=STEPS[step].elements;for(var i=els.length-1;i>=0;i--){var el=els[i];if(mx>=el.x*W&&mx<=(el.x+el.w)*W&&my>=el.y*H&&my<=(el.y+el.h)*H)return i;}return -1;}
function doT(cb){trans=true;tA=0;var up=true,fr=0;var a=setInterval(function(){fr++;if(up){tA=Math.min(1,tA+0.15);if(tA>=1){up=false;cb();}}else{tA=Math.max(0,tA-0.12);if(tA<=0){clearInterval(a);trans=false;}}dScene();},30);}
var cv=document.getElementById('view'),tt=document.getElementById('tooltip');
cv.addEventListener('mousemove',function(e){var r=cv.getBoundingClientRect(),sc=W/r.width,mx=(e.clientX-r.left)*sc,my=(e.clientY-r.top)*sc,hit=gH(mx,my);if(hit!==hov){hov=hit;dScene();}if(hit>=0){var el=STEPS[step].elements[hit];tt.style.display='block';tt.style.left=Math.min(e.clientX-r.left+14,r.width-250)+'px';tt.style.top=Math.max(e.clientY-r.top-55,8)+'px';tt.innerHTML='<span style="color:#8ade50;font-size:11px;text-transform:uppercase">'+(el.type==='door'?'Porte':el.type==='vine'?'Liane':el.type==='river'?'Rivière':'Arbre')+'</span><br>'+el.text;cv.style.cursor='pointer';}else{tt.style.display='none';cv.style.cursor='default';}});
cv.addEventListener('mouseleave',function(){hov=null;tt.style.display='none';dScene();});
function hC(mx,my){if(trans)return;var hit=gH(mx,my);if(hit<0)return;var el=STEPS[step].elements[hit];playClick(el.type);tt.style.display='none';doT(function(){Object.entries(el.scores).forEach(function(e){scores[e[0]]=(scores[e[0]]||0)+e[1];});step++;hov=null;if(step>=STEPS.length)playReveal();rP();});}
cv.addEventListener('click',function(e){var r=cv.getBoundingClientRect(),sc=W/r.width;hC((e.clientX-r.left)*sc,(e.clientY-r.top)*sc);});
cv.addEventListener('touchend',function(e){e.preventDefault();var r=cv.getBoundingClientRect(),sc=W/r.width,t=e.changedTouches[0];hC((t.clientX-r.left)*sc,(t.clientY-r.top)*sc);},{passive:false});
function topK(){return Object.entries(scores).sort(function(a,b){return b[1]-a[1];})[0][0];}
function setTab(t){tab=t;sR(document.getElementById('scene-panel'));}
function rP(){var p=document.getElementById('scene-panel');if(step>=STEPS.length){sR(p);return;}p.innerHTML='<div class="sinfo">Clairière '+(step+1)+' sur '+STEPS.length+'</div><div class="slabel">Ce que tu vis</div><div class="stext">'+STEPS[step].scene+'</div><div class="shint">Clique sur une porte, une liane, une rivière ou un arbre.</div>';}
function sR(p){var key=topK(),a=ARCHETYPES[key];var tb='<div class="tab-bar">'+['profil','détail','réflexion'].map(function(t){return'<button class="tab'+(tab===t?' active':'')+'" onclick="setTab(\''+t+'\')">'+t.charAt(0).toUpperCase()+t.slice(1)+'</button>';}).join('')+'</div>';var c='';if(tab==='profil')c='<div class="badge">'+a.badge+'</div><div class="arch-name">'+a.label+'</div><div class="arch-desc">'+a.desc+'</div><div class="sec">Tes traits</div><div class="traits">'+a.traits.map(function(t){return'<span class="trait">'+t+'</span>';}).join('')+'</div>';else if(tab==='détail')c='<div class="arch-name" style="font-size:18px;margin-bottom:1rem">'+a.label+'</div><div class="sec">Tes forces</div><div class="info-block"><p>'+a.forces+'</p></div><div class="sec">Ton ombre</div><div class="info-block"><p>'+a.ombre+'</p></div><div class="sec">En coaching</div><div class="info-block"><p>'+a.coaching+'</p></div>';else c='<div class="arch-name" style="font-size:18px;margin-bottom:.25rem">'+a.label+'</div><p style="font-size:13px;color:#4a8a4a;margin-bottom:1.25rem">Questions de réflexion :</p>'+a.questions.map(function(q,i){return'<div class="q-card"><div class="q-num">Question '+(i+1)+'</div><p>'+q+'</p></div>';}).join('');p.innerHTML=tb+'<div class="result-card">'+c+'</div><button class="restart-btn" onclick="restart()">Recommencer</button>';}
function restart(){scores={Flamme:0,Tisserand:0,Oracle:0,Racine:0,Reflet:0,Passeur:0};step=0;tab='profil';hov=null;dScene();rP();}
document.getElementById('overlay').addEventListener('click',function(){
  this.classList.add('fade');
  setTimeout(function(){document.getElementById('overlay').style.display='none';},700);
  initAmbience();
});
dScene();rP();
